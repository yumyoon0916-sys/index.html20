<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YoonHeejeong | Portfolio</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; 
      min-height: 100vh; 
      background-color: #000; 
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    #global-canvas {
      position: fixed; 
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0; 
      pointer-events: none;
    }

    #mask-wrapper {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh; /* 화면 전체를 덮어야 깔끔합니다 */
      z-index: 10; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
    }
    
    #blob-svg {
      width: 150vmax; height: 150vmax; /* 구멍이 충분히 커지도록 여유 있게 설정 */
      transform-origin: center center;
    }

    .intro-bottom-text {
      position: fixed; bottom: 5vh; left: 5vw;
      z-index: 15; color: #000;
      font-size: 2vw; font-weight: 800;
      line-height: 1.1; letter-spacing: -0.02em;
    }

    #intro-spacer { height: 200vh; }

    #furuya-section {
      position: relative;
      width: 100%; height: 100vh;
      background-color: transparent; 
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 0 5vw;
    }
   
    .content-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 30%, rgba(0,0,0,1) 100%);
      z-index: -1;
    }

    .left-panel {
      width: 30%;
      position: relative;
      height: 15vw;
    }
    
    .core-values-label {
      font-size: 1.2vw; font-weight: 600; color: #888;
      margin-bottom: 0.5rem;
    }
    
    .main-label-wrapper {
      position: relative;
      width: 100%; height: 10vw;
    }
    
    .main-label {
      position: absolute; top: 0; left: 0;
      font-size: 8vw; font-weight: bold; letter-spacing: -0.04em;
      opacity: 0; transform: translateY(20px);
      transition: all 0.4s ease;
    }
    
    .main-label.active {
      opacity: 1; transform: translateY(0);
    }

    .right-panel {
      width: 70%;
      padding-left: 4vw;
    }
    
    .about-paragraph {
      font-size: 3.5vw;
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    
    .right-text-span {
      color: #333; 
      transition: color 0.4s ease;
    }
    
    .right-text-span.active {
      color: #fff; 
    }
  </style>
</head>
<body>

  <canvas id="global-canvas"></canvas>

  <div id="mask-wrapper">
    <svg id="blob-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
      <path fill="#ffffff" fill-rule="evenodd" 
            d="M-100,-100 H200 V200 H-100 Z 
               M 50,10 
               C 55,35 75,35 90,40 
               C 70,55 80,85 50,90 
               C 20,85 30,55 10,40 
               C 25,35 45,35 50,10 Z" />
    </svg>
  </div>

  <div class="intro-bottom-text" id="intro-text">
    YoonHeejeong<br>Portfolio
  </div>

  <div id="intro-spacer"></div>

  <div id="furuya-section">
    <div class="content-overlay"></div>
    
    <div class="left-panel">
      <p class="core-values-label">
      <div class="main-label-wrapper">
        <div class="main-label active" id="label-who">Who.</div>
        <div class="main-label" id="label-where">Where.</div>
        <div class="main-label" id="label-how">How.</div>
      </div>
    </div>
    
    <div class="right-panel">
      <p class="about-paragraph">
        <span class="right-text-span active" id="text-who">
          윤희정. 순수미술과 디자인의 경계를 넘나들며, 사람들에게 감각적인 연결의 경험을 전하고자 하는 작업을 합니다.
        </span>
        <span class="right-text-span" id="text-where">
          Based in Seoul. 서울과학기술대학교 조형예술학과를 전공하고 시각디자인을 복수전공을 하고 다양한 시각작업을 이어갑니다.
        </span>
        <span class="right-text-span" id="text-how">
          순수미술의 감성과 디자인의 커뮤니케이션 방식을 결합하여, 사람들에게 오래 남는 경험을 만들고자 합니다.
        </span>
      </p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <script>
    const canvas = document.getElementById('global-canvas');
    const scene = new THREE.Scene();
    
    // 에러의 원인이었던 부분! 주석 처리를 정확히 해줍니다.
    scene.fog = new THREE.FogExp2(0x000000, 0.0005); // 깊이감 형성

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 6000);
    camera.position.z = 500;

    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    const textureLoader = new THREE.TextureLoader();
    const images = [
      'https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=1200',
      'https://images.unsplash.com/photo-1578301978693-85fa9c026f43?w=1200',
      'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=1200',
      'https://images.unsplash.com/photo-1536924940846-227afb31e2a5?w=1200'
    ];

    const artworks = [];
    const geometry = new THREE.PlaneGeometry(500, 650);

    for (let i = 0; i < 70; i++) {
      const material = new THREE.MeshBasicMaterial({
        map: textureLoader.load(images[i % images.length]),
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.95
      });
      const mesh = new THREE.Mesh(geometry, material);

      mesh.position.set(
        (Math.random() - 0.5) * 5000, 
        (Math.random() - 0.5) * 5000, 
        Math.random() * -6000
      );
      
      mesh.rotation.z = (Math.random() - 0.5) * 0.1;
      
      scene.add(mesh);
      artworks.push(mesh);
    }

    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    function animateThree() {
      requestAnimationFrame(animateThree);

      camera.position.x += (mouseX * 1000 - camera.position.x) * 0.05;
      camera.position.y += (mouseY * 1000 - camera.position.y) * 0.05;
      camera.lookAt(0, 0, -2000);

      artworks.forEach(mesh => {
        mesh.position.z += 2; // 다가오는 속도
        if (mesh.position.z > camera.position.z + 300) {
          mesh.position.z = -6000; // 시야를 벗어나면 뒤로 리셋
        }
      });

      renderer.render(scene, camera);
    }
    animateThree();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    gsap.registerPlugin(ScrollTrigger);

    gsap.to("#blob-svg", {
      scrollTrigger: {
        trigger: "#intro-spacer",
        start: "top top",
        end: "bottom top",
        scrub: 1.5
      },
      scale: 150, 
      ease: "power2.inOut"
    });

    gsap.to("#intro-text", {
      scrollTrigger: { trigger: "#intro-spacer", start: "top top", end: "30% top", scrub: true },
      opacity: 0, y: -50
    });

    const labels = [
      document.getElementById('label-who'),
      document.getElementById('label-where'),
      document.getElementById('label-how')
    ];
    
    const texts = [
      document.getElementById('text-who'),
      document.getElementById('text-where'),
      document.getElementById('text-how')
    ];

    ScrollTrigger.create({
      trigger: "#furuya-section",
      start: "top top",
      end: "+=300%", 
      pin: true,
      onUpdate: (self) => {
        const p = self.progress;
        let index = 0;
        
        if (p > 0.33 && p <= 0.66) index = 1;      // Where 구간
        else if (p > 0.66) index = 2;              // How 구간

        // 왼쪽 라벨 교체
        labels.forEach((label, i) => {
          if (i === index) label.classList.add('active');
          else label.classList.remove('active');
        });

        // 오른쪽 텍스트 하이라이트 전환
        texts.forEach((text, i) => {
          if (i === index) text.classList.add('active');
          else text.classList.remove('active');
        });
      }
    });
  </script>
</body>
</html>
